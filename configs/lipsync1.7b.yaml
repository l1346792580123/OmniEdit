task: lipsync
mixed_precision: bf16
wan_vae_path: Wan2.1-T2V-1.3B/Wan2.1_VAE.pth
wan_text_path: Wan2.1-T2V-1.3B/models_t5_umt5-xxl-enc-bf16.pth
wan_tokenizer_path: Wan2.1-T2V-1.3B/google/umt5-xxl
