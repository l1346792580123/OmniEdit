checkpoint_path: [HuMo/HuMo-1.7B/ema.pth]

num_frames: 97
start_step: 6
end_step: 16
cfg_scale: 4.5

video_paths: [examples/video1.mp4]

audio_paths: [examples/audio1.wav]

